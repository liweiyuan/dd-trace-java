muzzle {
  pass {
    group = "org.apache.axis2"
    module = "axis2-kernel"
    versions = "[1.3,)"
  }
}

apply from: "$rootDir/gradle/java.gradle"

apply plugin: 'org.unbroken-dome.test-sets'

testSets {
  latestDepTest {
    dirName = 'test'
  }
}

configurations.all {
  // the version used by axis2 isn't available in a public repository - we don't need it, so exclude it
  exclude group: 'org.apache.woden', module: 'woden'
}

dependencies {
  compileOnly group: 'org.apache.axis2', name: 'axis2-kernel', version: '1.3'

  testImplementation group: 'org.apache.axis2', name: 'axis2-kernel', version: '1.3'

  latestDepTestCompile group: 'org.apache.axis2', name: 'axis2-kernel', version: '1.7.9'
  latestDepTestCompile group: 'org.apache.axis2', name: 'axis2-transport-local', version: '1.7.9'
  latestDepTestCompile group: 'org.apache.axis2', name: 'axis2-transport-http', version: '1.7.9'
  latestDepTestCompile group: 'org.apache.axis2', name: 'axis2-adb', version: '1.7.9'
}
